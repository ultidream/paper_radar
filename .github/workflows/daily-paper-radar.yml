name: Daily Paper Radar

on:
  schedule:
    # 07:00 Asia/Shanghai = 23:00 UTC on the previous day.
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.OPENAI_API_KEY }}
      LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
      LLM_MODEL: ${{ vars.LLM_MODEL || vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
      EMAIL_ENABLED: "true"
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate runtime configuration
        shell: bash
        run: |
          missing=0
          for name in LLM_API_KEY SMTP_USER SMTP_PASSWORD REPORT_RECIPIENTS; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing or empty"
              missing=1
            else
              echo "$name is configured"
            fi
          done
          echo "LLM_MODEL=${LLM_MODEL}"
          if [ -n "$LLM_BASE_URL" ]; then
            echo "LLM_BASE_URL is configured"
          else
            echo "LLM_BASE_URL is empty; this is okay for OpenAI, but required for most other providers"
          fi
          exit "$missing"

      - name: Run daily report
        run: python -m paper_radar.main

      - name: Upload generated report
        uses: actions/upload-artifact@v4
        with:
          name: paper-radar-report
          path: reports/*.docx
          if-no-files-found: warn
